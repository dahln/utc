<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UTC Clock</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <main class="clock-app">
        <h1>Current UTC Time</h1>
        <p id="clock" class="led-display" aria-live="polite">--:--:--</p>
      </main>
      <section class="clock-app local-clock">
        <h2>Local Time</h2>
        <p id="local-clock" class="led-display local-led" aria-live="polite">--:--:--</p>
        <p id="timezone" class="timezone"></p>
      </section>
      <label class="toggle" for="hour-format-toggle">
        <input id="hour-format-toggle" type="checkbox" />
        <span>Use 12-hour format</span>
      </label>
    </div>
    <script src="script.js"></script>
  </body>
</html>
